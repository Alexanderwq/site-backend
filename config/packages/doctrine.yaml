doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        types:
            user_user_id: 'App\Model\User\Entity\User\IdType'
            user_user_email: 'App\Model\User\Entity\User\EmailType'
            user_user_role: 'App\Model\User\Entity\User\RoleType'
            account_massage_form_id: 'App\Model\Account\Entity\MassageForm\IdType'
            account_massage_form_user_id: 'App\Model\Account\Entity\MassageForm\UserIdType'
            account_massage_form_photo_id: 'App\Model\Account\Entity\MassageForm\Photo\IdType'
            account_favorite_profile_profile_id: 'App\Model\Account\Entity\FavoriteMassageForm\MassageFormIdType'
            account_favorite_profile_user_id: 'App\Model\Account\Entity\FavoriteMassageForm\UserIdType'
            account_favorite_group_id: 'App\Model\Account\Entity\FavoriteGroup\IdType'
            account_favorite_group_user_id: 'App\Model\Account\Entity\FavoriteGroup\UserIdType'

        profiling_collect_backtrace: '%kernel.debug%'
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            User:
                is_bundle: false
                dir: '%kernel.project_dir%/src/Model/User/Entity'
                prefix: 'App\Model\User\Entity'
                alias: User
            Account:
                is_bundle: false
                dir: '%kernel.project_dir%/src/Model/Account/Entity'
                prefix: 'App\Model\Account\Entity'
                alias: Account
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
